name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab
jobs:
  run_playwright_tests_and_deploy_report:
    timeout-minutes: 60
    name: Run Playwright Tests and Deploy Report
    runs-on: ubuntu-latest
    permissions:
        contents: write  # Required for peaceiris/actions-gh-pages to push to a branch


    steps:
        - uses: actions/checkout@v5
        - uses: actions/setup-node@v5
          with:
            node-version: lts/*
        - name: Install dependencies
          run: npm ci

        - name: Install Playwright Browsers
          run: npx playwright install --with-deps

        - name: Run Playwright tests
          id: run_tests
          continue-on-error: true
          run: npx playwright test

        - name: Checkout gh-pages branch
          if: always()
          uses: actions/checkout@v5
          with:
            ref: gh-pages
            path: gh-pages
        
        - name: Prepare Report Folder
          if: always()
          run: |
            mkdir -p solid-waffle-reports

            # Copy previous reports if they exist
            if [ -d gh-pages ]; then
            cp -rp gh-pages/*/ solid-waffle-reports/ 2>/dev/null || true
            fi

            # Add the current report
            cp -rp playwright-report solid-waffle-reports/${{ github.run_number }}
            echo "${{ github.sha }}" > solid-waffle-reports/${{ github.run_number }}/.sha
            echo "${{ steps.run_tests.outcome }}" > solid-waffle-reports/${{ github.run_number }}/.status
        
        - name: Log solid-waffle-reports contents
          if: always()
          run: ls -la solid-waffle-reports/

        - name: Generate Navigation Index
          if: always()
          run: bash scripts/generate-index.sh solid-waffle-reports

        - name: Fail if tests failed
          if: always() && steps.run_tests.outcome == 'failure'
          run: exit 1

        - name: Deploy to GitHub Pages
          if: always() # Ensure report is uploaded even if tests fail
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./solid-waffle-reports
            keep_files: true # Crucial: prevents deleting previous folders

