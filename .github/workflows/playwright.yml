name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab
jobs:
  run_playwright_tests_and_deploy_report:
    timeout-minutes: 60
    name: Run Playwright Tests and Deploy Report
    runs-on: ubuntu-latest
    permissions:
        contents: write  # Required for peaceiris/actions-gh-pages to push to a branch


    steps:
        - uses: actions/checkout@v5
        - uses: actions/setup-node@v5
          with:
            node-version: lts/*
        - name: Install dependencies
          run: npm ci

        - name: Install Playwright Browsers
          run: npx playwright install --with-deps

        - name: Run Playwright tests
          run: npx playwright test

        - name: Checkout gh-pages branch
          uses: actions/checkout@v5
          with:
            ref: gh-pages
            path: gh-pages
        
        - name: Copy existing reports from gh-pages
          if: always() # Ensure this runs even if tests fail
          run: |
            mkdir -p solid-waffle-reports
            if [ -d gh-pages ]; then
              cp -rp gh-pages/*/ solid-waffle-reports/ 2>/dev/null || true
            fi
            
        - name: Copy reports to main branch
          if: always()
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git fetch origin gh-pages
            git checkout origin/gh-pages -- solid-waffle-reports
            git add solid-waffle-reports
            git diff --cached --quiet || git commit -m "ci: sync solid-waffle-reports from gh-pages [skip ci]"
            git push origin HEAD:main

        - uses: actions/checkout@v5 # Re-checkout the main branch to get the latest report
        - name: Prepare Report Folder
          if: always()
          run: |
            # Add the current report
            cp -rp playwright-report solid-waffle-reports/${{ github.run_number }}

        - name: Generate Navigation Index
          if: always()
          run: |
            {
              cat <<'EOF'
            <!DOCTYPE html>
            <html>
            <head>Hacker News testing reports</title>
                <style>
                    :root { --color-text-primary: #444; --color-text-secondary: #111; --color-bg-primary: #ddd; --color-bg-secondary: #bbb; }
                    @media (prefers-color-scheme: dark) { :root { --color-text-primary: #bbb; --color-text-secondary: #eee; --color-bg-primary: #242424; --color-bg-secondary: #444; } }
                    html, body { margin: 0; padding: 0; background-color: var(--color-bg-primary); color: var(--color-text-primary); font-family: ui-sans-serif, system-ui, sans-serif; }
                    body { display: flex; flex-direction: column; margin: 2em 1.25em; font-size: 16px; }
                    a { color: var(--color-text-secondary); font-weight: 500; }
                    table { width: 100%; border-collapse: collapse; }
                    th, td { padding: 1.25rem 1rem; text-align: left; }
                </style>
            </head>
            <body>
                <header><h1>Hacker News testing reports</h1></header>
                <main>
                    <table>
                        <thead><tr><th>Name</th><th>Last Modified</th></tr></thead>
                        <tbody>
                            <tr><td><a href="..">[..]</a></td><td>-</td></tr>
            EOF
              ls -d solid-waffle-reports/*/ | xargs -I{} basename {} | sort -rn | while read dir; do
                modified=$(stat -c '%y' "solid-waffle-reports/$dir" | cut -d'.' -f1)
                echo "                    <tr><td><a href=\"./$dir\">[$dir]</a></td><td>$modified</td></tr>"
              done
              cat <<'EOF'
                        </tbody>
                    </table>
                </main>
            </body>
            </html>
            EOF
            } > solid-waffle-reports/index.html

        - name: Deploy to GitHub Pages
          if: always() # Ensure report is uploaded even if tests fail
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./solid-waffle-reports
            keep_files: true # Crucial: prevents deleting previous folders

