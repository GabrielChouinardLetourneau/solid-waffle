name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab
jobs:
  run_playwright_tests_and_deploy_report:
    timeout-minutes: 60
    name: Run Playwright Tests and Deploy Report
    runs-on: ubuntu-latest
    permissions:
        contents: write  # Required for peaceiris/actions-gh-pages to push to a branch


    steps:
        - uses: actions/checkout@v5
        - uses: actions/setup-node@v5
          with:
            node-version: lts/*
        - name: Install dependencies
          run: npm ci

        - name: Install Playwright Browsers
          run: npx playwright install --with-deps

        - name: Run Playwright tests
          run: npx playwright test

        - name: Deploy to GitHub Pages
          if: always() # Ensure report is uploaded even if tests fail
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./playwright-report
            destination_dir: ${{ github.run_id }} # Stores each report in a folder named after the run ID | https://gabrielchouinardletourneau.github.io/solid-waffle/<run_id>
            keep_files: true # Crucial: prevents deleting previous folders