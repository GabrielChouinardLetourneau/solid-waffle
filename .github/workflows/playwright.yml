name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab
jobs:
  run_playwright_tests_and_deploy_report:
    timeout-minutes: 60
    name: Run Playwright Tests and Deploy Report
    runs-on: ubuntu-latest
    permissions:
        contents: write  # Required for peaceiris/actions-gh-pages to push to a branch and for the preparation of the report folder


    steps:
        - uses: actions/checkout@v5
        - uses: actions/setup-node@v5
          with:
            node-version: lts/*
        - name: Install dependencies
          run: npm ci

        - name: Install Playwright Browsers
          run: npx playwright install --with-deps

        - name: Run Playwright tests
          run: npx playwright test

        - name: Prepare Report Folder
          if: always()
          run: |
            # Create report directory if it doesn't exist
            mkdir -p solid-waffle-reports
            # Copy the current run's report into a numbered subfolder
            cp -r playwright-report solid-waffle-reports/${{ github.run_number }}

        - name: Generate Navigation Index
          if: always()
          run: |
            cd solid-waffle-reports
            # Generate index.html with links to all run folders
            cat > index.html << 'EOF'
            <!DOCTYPE html>
            <html>
            <head>
              <title>Playwright Test Reports</title>
              <style>
                body { font-family: Arial, sans-serif; margin: 20px; }
                h1 { color: #333; }
                ul { list-style-type: none; padding: 0; }
                li { margin: 10px 0; }
                a { color: #0066cc; text-decoration: none; font-size: 16px; }
                a:hover { text-decoration: underline; }
              </style>
            </head>
            <body>
              <h1>Playwright Test Reports</h1>
              <ul>
            EOF
            
            # Add links for all numeric folders (run numbers), sorted in descending order
            for run in $(ls -d [0-9]* 2>/dev/null | sort -rn); do
              echo "                <li><a href=\"$run/index.html\">Run #$run</a></li>" >> index.html
            done
            
            cat >> index.html << 'EOF'
              </ul>
            </body>
            </html>
            EOF

        - name: Deploy to GitHub Pages
          if: always() # Ensure report is uploaded even if tests fail
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./solid-waffle-reports
            keep_files: true # Crucial: prevents deleting previous folders

