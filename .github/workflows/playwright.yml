name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab
jobs:
  run_playwright_tests_and_deploy_report:
    timeout-minutes: 60
    name: Run Playwright Tests and Deploy Report
    runs-on: ubuntu-latest
    permissions:
        contents: write  # Required for peaceiris/actions-gh-pages to push to a branch and for the preparation of the report folder


    steps:
        - uses: actions/checkout@v5
        - uses: actions/setup-node@v5
          with:
            node-version: lts/*
        - name: Install dependencies
          run: npm ci

        - name: Install Playwright Browsers
          run: npx playwright install --with-deps

        - name: Run Playwright tests
          run: npx playwright test

        - name: Prepare Report Folder
          if: always()
          run: |
            # Fetch existing gh-pages branch to preserve previous runs
            git fetch origin gh-pages --depth=1 2>/dev/null || true
            
            # Check out existing reports folder from gh-pages if it exists
            if git rev-parse origin/gh-pages >/dev/null 2>&1; then
              git checkout origin/gh-pages -- solid-waffle-reports 2>/dev/null || mkdir -p solid-waffle-reports
            else
              mkdir -p solid-waffle-reports
            fi
            
            # Copy the current run's report into a numbered subfolder
            cp -r playwright-report solid-waffle-reports/${{ github.run_number }}

        - name: Generate Navigation Index
          if: always()
          uses: gacts/directory-listing@v1
          with:
            target: solid-waffle-reports # This creates index.html with all runs

        - name: Deploy to GitHub Pages
          if: always() # Ensure report is uploaded even if tests fail
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./solid-waffle-reports
            keep_files: true # Crucial: prevents deleting previous folders

